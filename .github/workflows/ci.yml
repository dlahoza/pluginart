name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  python-runtime:
    name: "Python runtime ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e runtimes/python build
      - run: python -m unittest discover -s runtimes/python/tests
      - run: cd runtimes/python && python -m build

  typescript-runtime:
    name: TypeScript runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd runtimes/typescript && npm install && npm run build && npm pack --dry-run

  examples-generation:
    name: "Examples: regenerate and integrate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install flatc
        run: sudo apt-get update && sudo apt-get install -y flatbuffers-compiler
      - name: Delete generated example code
        run: |
          rm -rf examples/host-go/plugins
          rm -rf examples/host-py/plugins
          rm -rf examples/host-ts/plugins
          rm -rf examples/host-ts/dist
          rm -rf examples/plugin-go/plugin
          rm -rf examples/plugin-py/plugin
          rm -rf examples/plugin-ts/plugin
          rm -rf examples/plugin-ts/dist
          rm -rf examples/plugin-repeat-go/plugin
          rm -rf examples/plugin-repeat-py/plugin
          rm -rf examples/plugin-repeat-ts/plugin
          rm -rf examples/plugin-repeat-ts/dist
      - name: Regenerate example code
        run: |
          go run ./cmd/pluginart gen bindings --target host --lang go --schema examples/schema/echo.fbs --out examples/host-go/plugins
          go run ./cmd/pluginart gen bindings --target host --lang go --schema examples/schema/repeat.fbs --out examples/host-go/plugins
          go run ./cmd/pluginart gen bindings --target host --lang python --schema examples/schema/echo.fbs --out examples/host-py/plugins/echo
          go run ./cmd/pluginart gen bindings --target host --lang python --schema examples/schema/repeat.fbs --out examples/host-py/plugins/repeat
          go run ./cmd/pluginart gen bindings --target host --lang typescript --schema examples/schema/echo.fbs --out examples/host-ts/plugins/echo
          go run ./cmd/pluginart gen bindings --target host --lang typescript --schema examples/schema/repeat.fbs --out examples/host-ts/plugins/repeat
          go run ./cmd/pluginart gen bindings --target plugin --lang go --schema examples/schema/echo.fbs --out examples/plugin-go/plugin
          go run ./cmd/pluginart gen plugin --lang python --name echo --schema examples/schema/echo.fbs --out examples/plugin-py
          go run ./cmd/pluginart gen plugin --lang typescript --name echo --schema examples/schema/echo.fbs --out examples/plugin-ts
          go run ./cmd/pluginart gen plugin --lang go --name repeat --schema examples/schema/repeat.fbs --out examples/plugin-repeat-go
          go run ./cmd/pluginart gen plugin --lang python --name repeat --schema examples/schema/repeat.fbs --out examples/plugin-repeat-py
          go run ./cmd/pluginart gen plugin --lang typescript --name repeat --schema examples/schema/repeat.fbs --out examples/plugin-repeat-ts
      - name: Install Python deps
        run: pip install -e runtimes/python -r examples/plugin-py/requirements.txt
      - name: Build plugin-go
        run: cd examples/plugin-go && go build -o plugin-go .
      - name: Build local TypeScript runtime package
        run: cd runtimes/typescript && npm install && npm run build
      - name: Build plugin-ts
        run: cd examples/plugin-ts && npm install && npm run build
      - name: Build host-ts
        run: cd examples/host-ts && npm install && npm run build
      - name: Build repeat Docker plugins
        run: |
          docker build -f examples/plugin-repeat-go/Dockerfile -t pluginart-repeat-go:local .
          docker build -f examples/plugin-repeat-py/Dockerfile -t pluginart-repeat-py:local .
          docker build -f examples/plugin-repeat-ts/Dockerfile -t pluginart-repeat-ts:local .
      - name: Run host-go
        run: |
          output=$(cd examples/host-go && go run . 2>/dev/null)
          echo "$output"
          echo "$output" | grep -qF 'echo (go):     HELLO FROM HOST'
          echo "$output" | grep -qF 'echo (python): HELLO FROM HOST'
          echo "$output" | grep -qF 'echo (ts):     HELLO FROM HOST'
          echo "$output" | grep -qF 'repeat (go):     hahaha'
          echo "$output" | grep -qF 'repeat (python): hahaha'
          echo "$output" | grep -qF 'repeat (ts):     hahaha'
      - name: Run host-py
        run: |
          output=$(python examples/host-py/main.py 2>/dev/null)
          echo "$output"
          echo "$output" | grep -qF 'echo (go):     HELLO FROM PYTHON HOST'
          echo "$output" | grep -qF 'echo (python): HELLO FROM PYTHON HOST'
          echo "$output" | grep -qF 'echo (ts):     HELLO FROM PYTHON HOST'
          echo "$output" | grep -qF 'repeat (go):     hahaha'
          echo "$output" | grep -qF 'repeat (python): hahaha'
          echo "$output" | grep -qF 'repeat (ts):     hahaha'
      - name: Run host-ts
        run: |
          output=$(cd examples/host-ts && node dist/main.js 2>/dev/null)
          echo "$output"
          echo "$output" | grep -qF 'echo (go):     HELLO FROM TS HOST'
          echo "$output" | grep -qF 'echo (python): HELLO FROM TS HOST'
          echo "$output" | grep -qF 'echo (ts):     HELLO FROM TS HOST'
          echo "$output" | grep -qF 'repeat (go):     hahaha'
          echo "$output" | grep -qF 'repeat (python): hahaha'
          echo "$output" | grep -qF 'repeat (ts):     hahaha'

  integration-host-go:
    name: "Integration: host-go → plugin-go + plugin-py + plugin-ts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/host-go/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Python deps
        run: pip install -e runtimes/python -r examples/plugin-py/requirements.txt
      - name: Build plugin-go
        run: cd examples/plugin-go && go build -o plugin-go .
      - name: Build local TypeScript runtime package
        run: cd runtimes/typescript && npm install && npm run build
      - name: Build plugin-ts
        run: cd examples/plugin-ts && npm install && npm run build
      - name: Build repeat Docker plugins
        run: |
          docker build -f examples/plugin-repeat-go/Dockerfile -t pluginart-repeat-go:local .
          docker build -f examples/plugin-repeat-py/Dockerfile -t pluginart-repeat-py:local .
          docker build -f examples/plugin-repeat-ts/Dockerfile -t pluginart-repeat-ts:local .
      - name: Run host-go
        run: |
          output=$(cd examples/host-go && go run . 2>/dev/null)
          echo "$output"
          echo "$output" | grep -qF 'echo (go):     HELLO FROM HOST'
          echo "$output" | grep -qF 'echo (python): HELLO FROM HOST'
          echo "$output" | grep -qF 'echo (ts):     HELLO FROM HOST'
          echo "$output" | grep -qF 'repeat (go):     hahaha'
          echo "$output" | grep -qF 'repeat (python): hahaha'
          echo "$output" | grep -qF 'repeat (ts):     hahaha'

  benchmark-runtime:
    name: "Benchmark: runtime overhead"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Python runtime
        run: python -m pip install -e runtimes/python
      - name: Build TypeScript runtime
        run: cd runtimes/typescript && npm install && npm run build
      - name: Build TypeScript benchmark helpers
        run: cd bench/typescript && npm install && npm run build
      - name: Build Go benchmark plugin
        run: |
          mkdir -p bench/bin
          go build -o bench/bin/pluginart-bench-go-plugin ./bench/go/bench_plugin
      - name: Run Go benchmarks
        run: |
          mkdir -p bench-results
          go test -tags bench ./bench/go -run TestBench -bench Benchmark -benchmem -benchtime=100x -count=1 | tee bench-results/go.txt
      - name: Run Python benchmarks
        run: |
          python bench/python/run_bench.py --iterations 100 --json bench-results/python.json
      - name: Run TypeScript benchmarks
        run: |
          node --expose-gc bench/typescript/dist/run-bench.js --iterations 100 --json bench-results/typescript.json
      - uses: actions/upload-artifact@v4
        with:
          name: pluginart-benchmarks
          path: bench-results/

  integration-host-ts:
    name: "Integration: host-ts → plugin-go + plugin-py + plugin-ts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/plugin-go/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Python deps
        run: pip install -e runtimes/python -r examples/plugin-py/requirements.txt
      - name: Build plugin-go
        run: cd examples/plugin-go && go build -o plugin-go .
      - name: Build local TypeScript runtime package
        run: cd runtimes/typescript && npm install && npm run build
      - name: Build plugin-ts
        run: cd examples/plugin-ts && npm install && npm run build
      - name: Build host-ts
        run: cd examples/host-ts && npm install && npm run build
      - name: Build repeat Docker plugins
        run: |
          docker build -f examples/plugin-repeat-go/Dockerfile -t pluginart-repeat-go:local .
          docker build -f examples/plugin-repeat-py/Dockerfile -t pluginart-repeat-py:local .
          docker build -f examples/plugin-repeat-ts/Dockerfile -t pluginart-repeat-ts:local .
      - name: Run host-ts
        run: |
          output=$(cd examples/host-ts && node dist/main.js 2>/dev/null)
          echo "$output"
          echo "$output" | grep -qF 'echo (go):     HELLO FROM TS HOST'
          echo "$output" | grep -qF 'echo (python): HELLO FROM TS HOST'
          echo "$output" | grep -qF 'echo (ts):     HELLO FROM TS HOST'
          echo "$output" | grep -qF 'repeat (go):     hahaha'
          echo "$output" | grep -qF 'repeat (python): hahaha'
          echo "$output" | grep -qF 'repeat (ts):     hahaha'

  integration-host-py:
    name: "Integration: host-py -> plugin-go + plugin-py + plugin-ts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/plugin-go/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pip install -e runtimes/python -r examples/plugin-py/requirements.txt
      - run: cd examples/plugin-go && go build -o plugin-go .
      - run: cd runtimes/typescript && npm install && npm run build
      - run: cd examples/plugin-ts && npm install && npm run build
      - name: Build repeat Docker plugins
        run: |
          docker build -f examples/plugin-repeat-go/Dockerfile -t pluginart-repeat-go:local .
          docker build -f examples/plugin-repeat-py/Dockerfile -t pluginart-repeat-py:local .
          docker build -f examples/plugin-repeat-ts/Dockerfile -t pluginart-repeat-ts:local .
      - run: |
          output=$(python examples/host-py/main.py 2>/dev/null)
          echo "$output"
          echo "$output" | grep -qF 'echo (go):     HELLO FROM PYTHON HOST'
          echo "$output" | grep -qF 'echo (python): HELLO FROM PYTHON HOST'
          echo "$output" | grep -qF 'echo (ts):     HELLO FROM PYTHON HOST'
          echo "$output" | grep -qF 'repeat (go):     hahaha'
          echo "$output" | grep -qF 'repeat (python): hahaha'
          echo "$output" | grep -qF 'repeat (ts):     hahaha'
