name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  python-runtime:
    name: "Python runtime ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e runtimes/python build
      - run: python -m unittest discover -s runtimes/python/tests
      - run: cd runtimes/python && python -m build

  typescript-runtime:
    name: TypeScript runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd runtimes/typescript && npm install && npm run build && npm pack --dry-run

  integration-host-go:
    name: "Integration: host-go → plugin-go + plugin-py"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/host-go/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: pip install -e runtimes/python -r examples/plugin-py/plugin/requirements.txt
      - name: Build plugin-go
        run: cd examples/plugin-go && go build -o plugin-go .
      - name: Run host-go
        run: |
          output=$(cd examples/host-go && go run . 2>/dev/null)
          echo "$output"
          echo "$output" | grep -qF 'echo (go):     HELLO FROM HOST'
          echo "$output" | grep -qF 'echo (python): HELLO FROM HOST'

  integration-host-ts:
    name: "Integration: host-ts → plugin-go + plugin-py"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/plugin-go/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Python deps
        run: pip install -e runtimes/python -r examples/plugin-py/plugin/requirements.txt
      - name: Build plugin-go
        run: cd examples/plugin-go && go build -o plugin-go .
      - name: Build local TypeScript runtime package
        run: cd runtimes/typescript && npm install && npm run build
      - name: Build host-ts
        run: cd examples/host-ts && npm install && npm run build
      - name: Run host-ts
        run: |
          output=$(cd examples/host-ts && node dist/main.js 2>/dev/null)
          echo "$output"
          echo "$output" | grep -qF 'echo (go):     HELLO FROM TS HOST'
          echo "$output" | grep -qF 'echo (python): HELLO FROM TS HOST'

  integration-host-py:
    name: "Integration: host-py -> plugin-go + plugin-py"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/plugin-go/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e runtimes/python flatbuffers
      - run: cd examples/plugin-go && go build -o plugin-go .
      - run: |
          output=$(python examples/host-py/main.py 2>/dev/null)
          echo "$output"
          echo "$output" | grep -qF 'echo (go):     HELLO FROM PYTHON HOST'
          echo "$output" | grep -qF 'echo (python): HELLO FROM PYTHON HOST'
