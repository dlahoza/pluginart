name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  python:
    name: Publish Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - id: pypi-version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          try:
              with urllib.request.urlopen("https://pypi.org/pypi/pluginart/json") as response:
                  data = json.load(response)
              exists = version in data.get("releases", {})
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              exists = False
          print(f"exists={'true' if exists else 'false'}")
          PY
      - run: python -m pip install build
        if: steps.pypi-version.outputs.exists != 'true'
      - run: cd runtimes/python && python -m build
        if: steps.pypi-version.outputs.exists != 'true'
      - uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.pypi-version.outputs.exists != 'true'
        with:
          packages-dir: runtimes/python/dist

  typescript:
    name: Publish npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - id: npm-version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "pluginart@$VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - run: cd runtimes/typescript && npm install && npm run build && npm test
      - run: cd runtimes/typescript && npm publish --access public
        if: steps.npm-version.outputs.exists != 'true'
