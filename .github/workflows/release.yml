name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  python:
    name: Publish Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install build
      - run: cd runtimes/python && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: runtimes/python/dist

  typescript:
    name: Publish npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
      - run: cd runtimes/typescript && npm install && npm run build && npm test
      - run: cd runtimes/typescript && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
